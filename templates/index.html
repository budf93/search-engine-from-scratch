<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Search Engine From Scratch</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="icon" href="data:,">
</head>
<body>
    <div class="glass-container main-wrapper">
        <header>
            <div class="logo">
                <svg width="32" height="32" viewBox="0 0 24 24" fill="none" class="animate-pulse">
                    <path d="M21 21L15 15M17 10C17 13.866 13.866 17 10 17C6.13401 17 3 13.866 3 10C3 6.13401 6.13401 3 10 3C13.866 3 17 6.13401 17 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                <h1>Search Engine From Scratch</h1>
            </div>
            <p class="subtitle">A custom-built retrieval engine leveraging in-memory indices, BM25 scoring, and Neural Expanders.</p>
            <div style="margin-top: 1rem;">
                <a href="/compare" style="font-weight: 600; color: var(--accent); padding: 0.5rem 1rem; border: 1px solid var(--accent); border-radius: 6px; text-decoration: none; transition: 0.2s;">
                    &rarr; Benchmark All Models
                </a>
            </div>
        </header>

        <section class="search-section">
            <div class="search-box glass-panel">
                <input type="text" id="searchInput" placeholder="Search the collection... (e.g. universitas indonesia)" autofocus>
                <button id="searchBtn">
                    <span>Search</span>
                    <div id="spinner" class="spinner hidden"></div>
                </button>
            </div>

            <div class="config-panel glass-panel">
                <div class="config-group">
                    <label for="indexSelect">Index Core</label>
                    <select id="indexSelect">
                        <option value="spimi" selected>SPIMI (In-Memory)</option>
                        <option value="bsbi">BSBI (Blocked Sort)</option>
                    </select>
                </div>
                
                <div class="config-group">
                    <label for="encodingSelect">Compression</label>
                    <select id="encodingSelect">
                        <option value="vbyte" selected>V-Byte</option>
                        <option value="eliasgamma">Elias-Gamma</option>
                        <option value="standard">Standard (No Compression)</option>
                    </select>
                </div>

                <div class="config-group">
                    <label for="scoringSelect">Scoring Method</label>
                    <select id="scoringSelect">
                        <option value="bm25" selected>BM25 (Default)</option>
                        <option value="tfidf">TF-IDF</option>
                        <option value="wand">WAND (Weak AND)</option>
                        <option value="splade">SPLADE (BM25 + Neural Expansion)</option>
                        <option value="colbert">ColBERT (Neural Re-ranker)</option>
                    </select>
                </div>

                <div class="config-group" style="margin-top: auto; display: flex; align-items: flex-end;">
                    <button id="buildIndexBtn" style="width: 100%; padding: 0.75rem; background: rgba(255, 255, 255, 0.05); color: var(--accent); border: 1px solid var(--accent); border-radius: 6px; cursor: pointer; font-weight: 600; display: flex; justify-content: center; align-items: center; gap: 0.5rem; transition: 0.2s;">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
                        <span>Build/Rebuild Index</span>
                    </button>
                </div>
            </div>
        </section>

        <section id="metricsContainer" class="metrics-section hidden">
            <!-- Filled via JS -->
        </section>

        <section id="resultsContainer" class="results-section">
            <div class="empty-state">
                <p>Enter a query to see documents from the collection.</p>
            </div>
        </section>
    </div>

    <!-- Micro-templates for JS injection -->
    <template id="resultCardTemplate">
        <div class="result-card glass-panel fade-in">
            <div class="result-header">
                <span class="doc-id"></span>
                <span class="doc-badge score-badge"></span>
            </div>
            <p class="snippet"></p>
        </div>
    </template>

    <script>
        const searchInput = document.getElementById('searchInput');
        const searchBtn = document.getElementById('searchBtn');
        const spinner = document.getElementById('spinner');
        const resultsContainer = document.getElementById('resultsContainer');
        const metricsContainer = document.getElementById('metricsContainer');
        const template = document.getElementById('resultCardTemplate');

        // Config Elements
        const indexSelect = document.getElementById('indexSelect');
        const encodingSelect = document.getElementById('encodingSelect');
        const scoringSelect = document.getElementById('scoringSelect');

        // Execute search on enter key
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') performSearch();
        });
        
        searchBtn.addEventListener('click', performSearch);

        // Build Index Handler
        const buildIndexBtn = document.getElementById('buildIndexBtn');
        buildIndexBtn.addEventListener('click', async () => {
            const indexType = indexSelect.value;
            const encoding = encodingSelect.value;

            // UI Loading State
            buildIndexBtn.disabled = true;
            buildIndexBtn.style.opacity = '0.5';
            buildIndexBtn.querySelector('span').textContent = 'Building... (~15s)';
            resultsContainer.innerHTML = '';
            metricsContainer.classList.add('hidden');

            try {
                const response = await fetch('/api/build_index', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ index_type: indexType, encoding: encoding })
                });
                
                const data = await response.json();
                
                if (!response.ok) {
                    throw new Error(data.error || 'Failed to build index.');
                }
                
                // Show Success
                resultsContainer.innerHTML = `
                    <div class="glass-panel fade-in" style="background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.2); text-align: center; padding: 2rem;">
                        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#22c55e" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom: 1rem;">
                            <circle cx="12" cy="12" r="10"></circle><polyline points="9 12 11 14 15 10"></polyline>
                        </svg>
                        <h3 style="color: #22c55e; margin-bottom: 0.5rem; font-size: 1.5rem;">Index Built Successfully!</h3>
                        <p>${data.message}</p>
                        <p style="font-size: 0.9em; opacity: 0.8; margin-top: 1rem;">Time taken: ${data.time_seconds} seconds</p>
                    </div>
                `;
            } catch (error) {
                renderError(error.message);
            } finally {
                buildIndexBtn.disabled = false;
                buildIndexBtn.style.opacity = '1';
                buildIndexBtn.querySelector('span').textContent = 'Build/Rebuild Index';
            }
        });

        async function performSearch() {
            const query = searchInput.value.trim();
            if (!query) return;

            // UI Loading State
            searchBtn.classList.add('loading');
            spinner.classList.remove('hidden');
            searchBtn.querySelector('span').textContent = 'Searching...';
            resultsContainer.innerHTML = '';
            metricsContainer.classList.add('hidden');

            const payload = {
                query: query,
                index_type: indexSelect.value,
                encoding: encodingSelect.value,
                scoring: scoringSelect.value,
                top_k: 10,
                colbert_candidates: 100
            };

            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Unknown error occurred.');
                }

                renderResults(data);
            } catch (error) {
                renderError(error.message);
            } finally {
                // Restore UI state
                searchBtn.classList.remove('loading');
                spinner.classList.add('hidden');
                searchBtn.querySelector('span').textContent = 'Search';
            }
        }

        function renderResults(data) {
            resultsContainer.innerHTML = ''; // clear

            // Show Metrics
            metricsContainer.classList.remove('hidden');
            metricsContainer.innerHTML = `
                <div class="metric glass-panel"><span>Latency</span><strong>${data.latency_seconds}s</strong></div>
                <div class="metric glass-panel"><span>Results</span><strong>${data.count}</strong></div>
                <div class="metric glass-panel"><span>Score Type</span><strong>${data.params.scoring.toUpperCase()}</strong></div>
            `;

            if (data.results.length === 0) {
                resultsContainer.innerHTML = `<div class="empty-state"><p>No relevant documents found.</p></div>`;
                return;
            }

            data.results.forEach((res, i) => {
                const clone = template.content.cloneNode(true);
                clone.querySelector('.doc-id').textContent = res.doc_id;
                clone.querySelector('.score-badge').textContent = `Score: ${res.score}`;
                clone.querySelector('.snippet').textContent = res.snippet;
                
                // Stagger animations
                const card = clone.querySelector('.result-card');
                card.style.animationDelay = `${i * 0.05}s`;
                
                resultsContainer.appendChild(clone);
            });
        }

        function renderError(message) {
            resultsContainer.innerHTML = `
                <div class="error-state glass-panel fade-in">
                    <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>
                    <p>${message}</p>
                </div>
            `;
        }
    </script>
</body>
</html>
